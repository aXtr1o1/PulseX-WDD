name: pulsex

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pulsex-api
    ports:
      - "8080:8000"
    volumes:
      - ./runtime:/app/runtime
      - ./indices:/app/indices
    env_file: .env
    environment:
      - PYTHONPATH=/app/apps/api
      - APP_ENV=prod
      - INDEX_REBUILD_ON_START=false
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8000/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    container_name: pulsex-web
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
      - INTERNAL_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
