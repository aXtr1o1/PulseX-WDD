services:
  # ── Backend (FastAPI + RAG) ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    env_file: .env
    environment:
      - PYTHONPATH=/code
      - PALMX_RUNTIME_DIR=/code/runtime
    volumes:
      - pulsex-wdd-v3-runtime-v1:/code/runtime
      - ./engine-KB:/code/engine-KB:ro
    ports:
      - "8081:8000"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Frontend (Next.js) ──────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
    environment:
      - NODE_ENV=production
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pulsex-wdd-v3-runtime-v1:
